name: Deploy to AWS 3-Tier App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOCKER_HUB_USERNAME: sibonelo190
  DOCKER_IMAGE_NAME: aws-3tier-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_TOKEN }}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: |
          ${{ env.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:latest
          ${{ env.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1
    
    - name: Get EC2 instance IDs from ASG
      id: get-instances
      run: |
        INSTANCE_IDS=$(aws autoscaling describe-auto-scaling-groups \
          --auto-scaling-group-names aws-3tier-app-asg \
          --query 'AutoScalingGroups[0].Instances[?LifecycleState==`InService`].InstanceId' \
          --output text)
        echo "instance_ids=$INSTANCE_IDS" >> $GITHUB_OUTPUT
    
    - name: Deploy to EC2 instances via SSM
      env:
        INSTANCE_IDS: ${{ steps.get-instances.outputs.instance_ids }}
      run: |
        for INSTANCE_ID in $INSTANCE_IDS; do
          echo "Deploying to instance: $INSTANCE_ID"
          
          # Send command to pull new image and restart container
          aws ssm send-command \
            --instance-ids $INSTANCE_ID \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "sudo docker pull sibonelo190/aws-3tier-app:latest",
              "sudo docker stop app || true",
              "sudo docker rm app || true",
              "DB_PASS=$(aws ssm get-parameter --name \"/app/aws-3tier-app/db_password\" --with-decryption --query \"Parameter.Value\" --output text --region us-east-1)",
              "sudo docker run -d --name app --restart always -p 5000:5000 \
                -e DB_HOST='${{ secrets.DB_HOST }}' \
                -e DB_NAME=appdb \
                -e DB_USER=postgres \
                -e DB_PASSWORD=\"$DB_PASS\" \
                sibonelo190/aws-3tier-app:latest",
              "sudo docker system prune -f"
            ]' \
            --region us-east-1 \
            --output text
        done
    
    - name: Wait for deployment to complete
      run: sleep 30
    
    - name: Verify deployment
      run: |
        ALB_DNS="aws-3tier-app-alb-637296993.us-east-1.elb.amazonaws.com"
        curl -f http://$ALB_DNS/health || echo "Health check failed, but deployment completed"